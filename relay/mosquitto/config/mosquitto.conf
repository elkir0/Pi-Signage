# =============================================================================
# ZAFORGE RELAY — mosquitto.conf  (eclipse-mosquitto:2.0.20)
# Auth model: dynamic-security plugin ONLY. No password_file, no anonymous.
# Two listeners (see CONTRACT trust zones 2 + admin plane):
#   1883  -> bound to wg0 (10.70.0.1): plaintext, reachable ONLY inside the
#            WireGuard tunnel. This is where zaforge-agent connects.
#   8883  -> bound to the relay private IP (10.10.10.160): TLS. Used by
#            fleet-api's privileged service client and reachable from the
#            private LAN / CT101 only. Never published to the public iface.
# =============================================================================

persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` works; keep it lean.
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true

# Cap inbound message payloads. Telemetry/status/result/event are all small JSON;
# this bounds memory/parse cost so a rooted enrolled device cannot push multi-MB
# (up to the protocol max) messages at the single shared fleet-api process. The
# app also rejects payloads over this size before JSON.parse (mqtt.js MAX_MQTT_PAYLOAD).
message_size_limit 131072

# Global ACL/auth — one principal set for all listeners.
per_listener_settings false
allow_anonymous false

# --- Dynamic security plugin -------------------------------------------------
# Self-contained authz/authn engine. State persists to dynamic-security.json
# on a Docker volume so it survives broker restarts. fleet-api drives it over
# the $CONTROL/dynamic-security/v1 topic using the bootstrap admin client.
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json

# --- Listener 1: in-tunnel plaintext (agents) --------------------------------
# 10.70.0.1 is wg0's address; it only exists because this container shares the
# wireguard container's network namespace (network_mode: service:wireguard).
listener 1883 10.70.0.1
protocol mqtt

# --- Listener 2: TLS admin/service plane (fleet-api service client + future CT101) -----
# Bind 0.0.0.0 INSIDE the shared wg netns (the host IP 10.10.10.160 is NOT an address
# in this netns). External exposure is restricted by the compose port-map
# (10.10.10.160:8883:8883). Access still requires TLS + dynsec svc/admin creds, which
# devices on wg0 never hold.
listener 8883 0.0.0.0
protocol mqtt
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
tls_version tlsv1.2
# Username/password auth over TLS (dynsec). No client-cert auth in this phase.
require_certificate false
