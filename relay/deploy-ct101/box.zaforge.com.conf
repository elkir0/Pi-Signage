# CT101 wildcard vhost for the Zaforge "mode complet" full-UI proxy.
# *.box.zaforge.com -> VM600 zf-uiproxy (10.10.10.160:8090), which validates the
# console-minted HMAC token and serves the device's full LAN UI over the tunnel.
# Additive vhost: never edit other vhosts. Wildcard cert via certbot dns-ovh.
server {
    listen 80;
    server_name *.box.zaforge.com;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name *.box.zaforge.com;

    ssl_certificate     /etc/letsencrypt/live/box.zaforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/box.zaforge.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /etc/nginx/snippets/security-headers.conf;   # X-Frame-Options DENY + HSTS + nosniff

    # The full LAN UI includes media upload — allow large bodies. The uiproxy and
    # the Pi enforce their own caps.
    client_max_body_size 600m;

    location / {
        proxy_pass http://10.10.10.160:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;                 # <label>.box.zaforge.com — uiproxy keys cookie scope
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The uiproxy STRIPS any client X-Zaforge-Proxy / X-Forwarded-* before
        # reaching the Pi; auth is the signed token, not these headers.
        proxy_request_buffering off;                 # stream uploads through the tunnel
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
