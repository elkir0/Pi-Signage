# CT101 reverse-proxy vhost for the Zaforge relay enrollment/API plane.
# Public HTTPS -> fleet-api on VM600 (10.10.10.160:3200). Additive: never edit
# other vhosts. Cert via certbot --webroot (HTTP-01), NOT --nginx.
server {
    listen 80;
    server_name relay.zaforge.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name relay.zaforge.com;

    ssl_certificate     /etc/letsencrypt/live/relay.zaforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.zaforge.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /etc/nginx/snippets/security-headers.conf;

    # Enrollment + admin/console API. Auth is enforced by fleet-api (enrollment
    # code on /enroll; Bearer/ADMIN on /admin). Body cap mirrors fleet-api's.
    client_max_body_size 1m;

    location / {
        proxy_pass http://10.10.10.160:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
