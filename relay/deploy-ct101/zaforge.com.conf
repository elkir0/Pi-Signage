server {
    server_name zaforge.com www.zaforge.com;

    # Zaforge marketing vitrine (static Astro). Replaces the disposable NotaCalc
    # draft that used to proxy to 10.10.10.141:8989.
    root /var/www/zaforge-vitrine;
    index index.html;

    # --- PRESERVED: Improv Soundboard (a SEPARATE service — do NOT touch) ---
    location ^~ /audio/ {
        alias /var/www/impro/audio/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /impro {
        return 301 /impro/;
    }
    location ^~ /impro/ {
        alias /var/www/impro/;
        try_files $uri $uri/ /impro/index.html;
        add_header Cache-Control "public, max-age=3600";
    }
    location ^~ /impro-api/ {
        proxy_pass http://127.0.0.1:3456/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        client_max_body_size 1m;
    }

    # --- Zaforge vitrine: serve static pages (Astro emits /<page>/index.html) ---
    location / {
        try_files $uri $uri/ =404;
    }
    error_page 404 /404.html;

    include /etc/nginx/snippets/security-headers.conf;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/zaforge.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zaforge.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.zaforge.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = zaforge.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name zaforge.com www.zaforge.com;
    return 404; # managed by Certbot
}
