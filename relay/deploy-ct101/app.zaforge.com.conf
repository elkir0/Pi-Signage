# CT101 reverse-proxy vhost for the Zaforge fleet CONSOLE (app.zaforge.com).
# Public HTTPS -> fleet-api on VM600 (10.10.10.160:3200), which serves the SPA
# static assets AND the /console BFF API on the same origin. Additive vhost:
# never edit other vhosts. Cert via certbot --webroot (HTTP-01), NOT --nginx.
#
# DEPLOY ORDER (two-phase, so a missing cert never breaks a reload):
#   1. ship the port-80 block only, reload, certbot --webroot -d app.zaforge.com
#   2. ship this full file (80+443), nginx -t, reload, verify prod unchanged
server {
    listen 80;
    server_name app.zaforge.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name app.zaforge.com;

    ssl_certificate     /etc/letsencrypt/live/app.zaforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.zaforge.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /etc/nginx/snippets/security-headers.conf;

    # Console is a same-origin BFF (httpOnly session cookie + CSRF). Auth is
    # enforced inside fleet-api; nginx only terminates TLS and proxies. Bodies are
    # small (login JSON, command JSON); cap mirrors fleet-api's.
    client_max_body_size 1m;

    location / {
        proxy_pass http://10.10.10.160:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
