NEW (CT101 deploy artifact) — a SEPARATE gated vhost mirroring relay.zaforge.com.conf but for the console + webhook. server_name app.zaforge.com; 80->443 redirect with the same /.well-known/acme-challenge webroot; 443 ssl http2 with its own letsencrypt cert; include security-headers.conf + add HSTS (Strict-Transport-Security). proxy_pass http://10.10.10.160:3200 with the same proxy_set_header block (Host, X-Real-IP, X-Forwarded-For, X-Forwarded-Proto). Notes: (a) location /webhook/stripe may need a slightly larger client_max_body_size (Stripe events can be a few hundred KB) and MUST NOT transform the body (raw bytes are signature-verified); (b) relay.zaforge.com.conf stays EXACTLY as-is (additive vhost). This leaves /enroll + /admin on relay.zaforge.com untouched and exposes /console + /webhook only on app.zaforge.com.