# =============================================================================
# wireguard/templates/server.conf
# This is the linuxserver/wireguard server template; the container renders it to
# /config/wg_confs/wg0.conf at start, substituting ${SERVERPORT} and the
# container-generated server private key (${PRIVATE_KEY}). fleet-api then live-adds
# [Peer] blocks via `wg set wg0 peer <pubkey> allowed-ips <device_ip>/32` and
# persists with `wg-quick save` / `wg syncconf`.
#
# Server address is 10.70.0.1/16 (the relay /32 the Pi routes to is 10.70.0.1).
# Per-tenant /28 blocks are carved by fleet-api from 10.70.0.0/16; the server /28
# (10.70.0.0/28) is reserved.
#
# CRITICAL ISOLATION — TWO relay-side enforcement points live in PostUp:
#
#   (1) NO MASQUERADE / NO FORWARD-ACCEPT (MUST-FIX, CRITICAL 1):
#       The linuxserver image's DEFAULT PostUp adds
#         iptables -A FORWARD ... -j ACCEPT  and
#         iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
#       which would let the relay route a device's traffic to the internet/LAN.
#       This is a PURE CONTROL-PLANE tunnel — we want NO routing of device
#       traffic. We therefore OVERRIDE PostUp/PostDown entirely below and do NOT
#       add MASQUERADE or a blanket FORWARD ACCEPT. ip_forward is also pinned OFF
#       in docker-compose.yml (net.ipv4.ip_forward=0).
#
#   (2) wg0 -> wg0 INTER-DEVICE DROP (MUST-FIX, CRITICAL 2):
#       The device-side AllowedIPs is the relay /32 (10.70.0.1/32) only, but that
#       is CLIENT-ENFORCED — a rooted Pi can rewrite its own AllowedIPs to
#       10.70.0.0/16 and try to reach a sibling device's /32. We enforce tenant
#       isolation on the RELAY with an explicit rule that DROPs any forwarded
#       packet that both ENTERS and LEAVES on wg0:
#         iptables -A FORWARD -i wg0 -o wg0 -j DROP
#       Why this is sufficient: a device talking to the relay's OWN services on
#       10.70.0.1 is INPUT to this (shared) netns, not FORWARD, so it is
#       unaffected. Only device<->device traffic transits wg0->wg0 in the FORWARD
#       chain, and we drop all of it. PostDown removes the rule on teardown.
# =============================================================================
[Interface]
Address = 10.70.0.1/16
ListenPort = ${SERVERPORT}
PrivateKey = ${PRIVATE_KEY}

# (1) Strip the linuxserver MASQUERADE/FORWARD-ACCEPT default by simply NOT adding
#     it here. (2) Add the explicit inter-device DROP. Order matters: the DROP is
#     appended to FORWARD; since we add no ACCEPT for wg0->wg0, this DROP is the
#     only verdict device<->device traffic can hit.
PostUp = iptables -A FORWARD -i wg0 -o wg0 -j DROP
PostDown = iptables -D FORWARD -i wg0 -o wg0 -j DROP

# --- Peers appended live by fleet-api at enrollment (example) ----------------
# [Peer]
# # device d_8f3k2m9q4r7s1v0x (tenant t_a1b2c3d4e5f6)
# PublicKey = <device wg public key>
# AllowedIPs = 10.70.0.18/32
